<!-- CAPA — Padrão relatoriomodelo.pdf -->
<div style="page-break-after: always; font-family: Arial, sans-serif; margin: 0; padding: 0; background: #fff; min-height: 100vh; position: relative; overflow: hidden; padding-bottom: 60px;">

  <!-- Cabeçalho azul escuro com logo do cliente + swoosh decorativo -->
  <div style="background: #1e3a5f; padding: 22px 36px; display: flex; align-items: center; justify-content: space-between; position: relative; overflow: hidden;">
    <!-- Swoosh decorativo (SVG inline) -->
    <svg style="position: absolute; right: 0; top: 0; height: 100%; opacity: 0.35;" viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMaxYMid meet">
      <ellipse cx="250" cy="0" rx="180" ry="90" fill="#e8420d" transform="rotate(-15 250 0)"/>
      <ellipse cx="290" cy="20" rx="130" ry="65" fill="#c23508" transform="rotate(-20 290 20)"/>
    </svg>
    <!-- Logo do cliente -->
    <div style="position: relative; z-index: 1;">
      {{#if logoUrl}}
        <img src="{{logoUrl}}" style="max-height: 60px; max-width: 180px; object-fit: contain;" alt="Logo" />
      {{else}}
        <div style="color: white; border: 1px solid rgba(255,255,255,0.35); padding: 12px 18px; font-weight: 900; font-size: 20px; letter-spacing: 1.5px; text-transform: uppercase; max-width: 260px;">{{brandName}}</div>
      {{/if}}
    </div>
  </div>

  <!-- Barra laranja com data -->
  <div style="background: #e8420d; padding: 10px 36px; text-align: center;">
    <span style="color: white; font-weight: 900; font-size: 16px; letter-spacing: 4px;">{{data}}</span>
  </div>

  <!-- Swooshes decorativos de fundo (marca d'água) -->
  <div style="position: absolute; bottom: 0; left: -60px; opacity: 0.06; pointer-events: none; z-index: 0;">
    <svg width="600" height="500" viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="200" cy="500" rx="400" ry="250" fill="#e8420d" transform="rotate(-30 200 500)"/>
      <ellipse cx="300" cy="450" rx="300" ry="180" fill="#1e3a5f" transform="rotate(-25 300 450)"/>
      <ellipse cx="100" cy="600" rx="350" ry="200" fill="#888" transform="rotate(-20 100 600)"/>
    </svg>
  </div>

  <!-- Corpo da capa -->
  <div style="position: relative; z-index: 1; padding: 60px 50px 40px; text-align: center;">

    <!-- Título principal -->
    <h1 style="font-size: 58px; font-weight: 900; color: #1e3a5f; letter-spacing: 6px; margin: 0 0 4px 0; text-transform: uppercase; line-height: 1.05;">RELATÓRIO</h1>
    <h1 style="font-size: 58px; font-weight: 900; color: #1e3a5f; letter-spacing: 6px; margin: 0 0 50px 0; text-transform: uppercase; line-height: 1.05;">TÉCNICO</h1>

    <!-- Logo do cliente (empreendimento) -->
    <div style="margin-bottom: 60px;">
      <div style="font-size: 28px; font-weight: 900; color: #1e3a5f; letter-spacing: 3px;">{{empreendimento}}</div>
    </div>

    <!-- Dados da capa - alinhados à direita em laranja -->
    <div style="text-align: right; max-width: 580px; margin-left: auto;">
      <div style="margin-bottom: 10px;">
        <span style="color: #e8420d; font-weight: 700; font-size: 13px;">Empresa:</span>
        <br>
        <span style="color: #1e3a5f; font-size: 15px; font-weight: 600;">{{empresa}}</span>
      </div>
      <div style="margin-bottom: 10px;">
        <span style="color: #e8420d; font-weight: 700; font-size: 13px;">Empreendimento:</span>
        <br>
        <span style="color: #1e3a5f; font-size: 15px; font-weight: 600;">{{empreendimento}}</span>
      </div>
      <div style="margin-bottom: 10px;">
        <span style="color: #e8420d; font-weight: 700; font-size: 13px;">Local da Obra:</span>
        <br>
        <span style="color: #1e3a5f; font-size: 14px;">{{local}}</span>
      </div>
      {{#if observacoes}}
      <div style="margin-top: 14px;">
        <span style="color: #e8420d; font-weight: 700; font-size: 13px;">OBS:</span>
        <br>
        <span style="color: #555; font-size: 13px; line-height: 1.5;">{{observacoes}}</span>
      </div>
      {{/if}}
    </div>
  </div>

  <!-- Rodapé fixo na base de cada página -->
  <div style="position: fixed; bottom: 0; left: 0; right: 0; background: #1e3a5f; padding: 0; z-index: 100;">
    <div style="height: 5px; background: #e8420d;"></div>
    <div style="padding: 10px 36px; display: flex; justify-content: space-between; align-items: center;">
      <div style="color: #aab8cc; font-size: 9px; letter-spacing: 0.8px; text-transform: uppercase;">Documento gerado pelo TACT</div>
      <div style="color: #ffffff; font-size: 9px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;">{{brandName}}</div>
    </div>
  </div>

</div>
